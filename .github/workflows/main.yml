name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python 3.9 (Stable for Flet 0.21)
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Force install the fixed version of the tool causing the crash
        pip install cookiecutter==2.1.1 binaryornot==0.4.4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'

    - name: Build APK
      run: |
        yes | flet build apk --verbose --product "WB-NEXUS"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: wb-nexus-release
        path: build/**/*.apk
