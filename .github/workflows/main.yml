name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # We install the requirements AND the build tools manually to ensure the patch works
        pip install -r requirements.txt
        pip install --upgrade cookiecutter binaryornot

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'

    - name: Build APK
      run: |
        # We use 'yes' to bypass prompts, and verbose to track progress
        yes | flet build apk --verbose --product "WB-NEXUS"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: wb-nexus-release
        path: build/**/*.apk
